name: Bulid TrafficMonitor Lite Release

on:
  workflow_dispatch:

jobs:
  x64_lite_build:
    runs-on: windows-latest

    steps:
    - name: Checkout TrafficMonitor source code
      uses: actions/checkout@v4
      with:
        repository: 'zhongyang219/TrafficMonitor'

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Run msbuild
      run: msbuild TrafficMonitor/TrafficMonitor.vcxproj -p:configuration="Release (lite)" -p:platform=x64 -p:platformToolset=v143

    - name : Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TrafficMonitor_Lite_x64
        path: TrafficMonitor/Bin/x64/Release (lite)/TrafficMonitor.exe
